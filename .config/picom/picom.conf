# ── Backend ───────────────────────────────────────────────────
backend = "glx";

# ── VSync ────────────────────────────────────────────────────
vsync = true;

# ── Fading ───────────────────────────────────────────────────
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-delta = 5;

# ── Corner Radius ────────────────────────────────────────────
corner-radius = 12;
round-borders = 1;

# ── Opacity ──────────────────────────────────────────────────
# Inactive windows get slight transparency
inactive-opacity = 0.92;
active-opacity = 1.0;

# Per-class overrides
opacity-rule = [
  # Terminals: more transparent when inactive
  "90:class_g = 'kitty' && focused",
  "75:class_g = 'kitty' && !focused",
  # Firefox: slight transparency when inactive
  "100:class_g = 'firefox' && focused",
  "88:class_g = 'firefox' && !focused",
  # Thunderbird
  "100:class_g = 'thunderbird' && focused",
  "88:class_g = 'thunderbird' && !focused",
  # LibreOffice
  "100:class_g = 'soffice.bin' && focused",
  "88:class_g = 'soffice.bin' && !focused",
  # Polybar: always opaque
  "100:class_g = 'polybar'",
  # Rofi: always opaque
  "100:class_g = 'rofi'"
];

# ── Shadows ──────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.25;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Don't shadow these
shadow-exclude = [
  "class_g = 'polybar'",
  "class_g = 'rofi'",
  "name = 'Notification'",
  "_NET_WM_WINDOW_TYPE = '_NET_WM_WINDOW_TYPE_DOCK'"
];

# ── Blur ─────────────────────────────────────────────────────
# Kernel blur for transparent windows (picom-fts branch)
blur-method = "kernel";
blur-kern = "7x7box";

# ── Rounded Corners Excludes ─────────────────────────────────
# Don't round these
corner-exclude = [
  "class_g = 'polybar'",
  "class_g = 'i3bar'"
];

# ── Performance ──────────────────────────────────────────────
unredir-if-possible = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;

# ── XRender fallback settings ────────────────────────────────
xrender-sync-fence = true;
