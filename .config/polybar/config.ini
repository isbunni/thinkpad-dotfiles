[colors]
background = #16161d
background-alt = #1f1f28
foreground = #dcd7ba
primary = #7e9cd8
secondary = #c8c093
alert = #c34043
disabled = #54546d

[bar/top]
inherit = bar/bar
bottom = false
monitor = eDP-1
modules-left = xworkspaces xwindow
modules-right = filesystem volume pulseaudio battery memory cpu bluetooth netspeed wifi date

[bar/bar]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = 
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;2"

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 15

mount-0 = /

label-mounted = %{F#c0a36e}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/battery]
type = custom/script
interval = 1
exec = ~/.config/polybar/scripts/battery.sh
format = <label>
label = %output%%

[module/memory]
type = internal/memory
interval = 1
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 1
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#c34043}%ifname%%{F#54546d} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#7e9cd8}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#957fb8}%ifname%%{F-} %local_ip%

[module/volume]
type = custom/script
interval = 5
exec = ~/.config/polybar/scripts/volume.sh
click-left = pavucontrol &
click-right = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
format-prefix = "󰕾 "
format-prefix-foreground = #c8c093
format = <label>
label = %output%

[module/bluetooth]
type = custom/script
interval = 5
exec = bash -c 'echo ""; bluetoothctl info 00:02:3C:AF:C3:76 2>/dev/null | grep -q "Connected: yes" && echo " " || echo " 󰂲"'
click-left = blueman-manager &
format-prefix-foreground = #c8c093
format = <label>

[module/wifi]
type = custom/script
interval = 30
exec = bash -c 'ssid=$(nmcli -t -f NAME con show --active 2>/dev/null | head -1); echo ${ssid:-disconnected}'
click-left = nm-connection-editor &
format-prefix = "󰤨 "
format-prefix-foreground = #c8c093
format = <label>
label = %output%

[module/scan]
type = custom/script
exec = echo SCAN
label-foreground = ${colors.primary}

; Left click = Start Scan
click-left = ~/.config/scripts/scan-master-cpp/polybar-scan.sh
; Right click = Learn Vendor
click-right = ~/.config/scripts/scan-master-cpp/polybar-learn.sh

interval = 99999
label = %output%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

[module/netspeed]
type = custom/script
interval = 1
exec = ~/.config/polybar/scripts/network-speed.sh
format-prefix = 󰖩 
format-prefix-foreground = #c8c093
format = <label>
label = %output%